  shared_preferences: ^2.5.3
  go_router: ^16.3.0
  flutter_svg: ^2.2.3
  dio: ^5.9.0
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  fluttertoast: ^9.0.0
  bloc: ^9.1.0
  retrofit: 4.8.0
  logger: ^2.6.2
  json_annotation: ^4.9.0
  injectable: ^2.5.2
  get_it: ^8.2.0
  google_fonts: ^6.3.2
  pinput: ^5.0.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  percent_indicator: ^4.2.5
  collection: ^1.19.1
  flutter_easyloading: ^3.0.5
  audioplayers: ^6.5.1
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.3.1
